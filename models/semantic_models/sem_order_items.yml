semantic_models:
- name: order_items
  description: Order items fact table at the item level. This table contains one row
    per order item and includes details about the product and order.
  model: ref('order_items')
  defaults:
    agg_time_dimension: ordered_at
  entities:
  - name: order_item
    type: primary
    expr: order_item_id
  - name: customer_order
    type: foreign
    expr: order_id
  - name: product
    type: foreign
    expr: product_id
  dimensions:
  - name: ordered_at
    type: time
    type_params:
      time_granularity: day
  - name: is_food_item
    type: categorical
  - name: is_drink_item
    type: categorical
  measures:
  - name: product_price
    description: The price of the product.
    agg: sum
    create_metric: true
  - name: supply_cost
    description: The cost of supplies for the product.
    agg: sum
    create_metric: true
  - name: count_order_item
    agg: count
    create_metric: true
    expr: order_item_id
  - name: count_product
    agg: count_distinct
    create_metric: true
    expr: product_id
