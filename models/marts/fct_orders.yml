models:
  - name: fct_orders
    semantic_model:
      enabled: true
    agg_time_dimension: ordered_at
    description: |
      Order fact table. This table is at the order grain with one row per order.
    columns:
      ## entities
      - name: order_id
        entity:
          type: primary
          name: order_id
      - name: location_id
        entity:
          type: foreign
          name: location_id
      - name: customer_id
        entity:
          type: foreign
          name: customer_id

      ## dimensions
      - name: ordered_at
        dimension:
          type: time
        granularity: day
      - name: order_total ## this is a dimension because we intend to filter by it later
        dimension:
          type: categorical
      - name: is_food_order
        dimension:
          type: categorical
      - name: is_drink_order
        dimension:
          type: categorical

    metrics: ## simple metrics
      - name: order_total
        description: The total amount for each order including taxes.
        agg: sum
      - name: order_count
        expr: 1
        agg: sum
      - name: tax_paid
        description: The total tax paid on each order.
        agg: sum
      - name: customers_with_orders
        description: Distinct count of customers placing orders
        agg: count_distinct
        expr: customer_id
      - name: locations_with_orders
        description: Distinct count of locations with order
        expr: location_id
        agg: count_distinct
      - name: order_cost
        description: The cost for each order item. Cost is calculated as a sum of the supply cost for each order item.
        agg: sum
      - name: order_value_p99
        expr: order_total
        agg: percentile
        percentile: 0.99
        percentile_type: continuous
      - name: discrete_order_value_p99
        expr: order_total
        agg: percentile
        percentile: 0.99
        percentile_type: discrete
      - name: food_order_amount
        expr: case when is_food_order then order_total else 0 end
        agg: sum
      - name: max_order_value
        expr: order_total
        agg: max
        agg_time_dimension: ordered_at
      - name: min_order_value
        expr: order_total
        agg: min
      - name: large_order
        description: "Count of orders with order total over 20."
        type: simple
        agg: sum
        label: "Large Orders"
        expr: 1
        filter: |
          {{ Dimension('order_id__order_total') }} >= 20
      - name: new_customer
        description: Unique count of new customers.
        label: New Customers
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: |
          {{ Dimension('customer_id__customer_type') }}  = 'new'

metrics: ## advanced metrics

#Ratio type metric
  - name: "food_order_pct"
    description: "The food cost as the % of the total order"
    label: "food_order_pct"    
    type: ratio
    numerator: food_order_amount
    denominator: order_total

#Derived Metrics      

  - name: "food_order_gross_profit"
    label: "food_order_gross_profit"    
    description: "The gross profit for each food order"
    type: derived
    expr: order_total - order_cost
    input_metrics:
      - name: order_total
        filter: |
          {{Dimension('order_id__is_food_order')}} = True
      - name: order_cost
        filter: |
          {{Dimension('order_id__is_food_order')}} = True
 #CUMULATIVE METRICS 
  - name: "cumulative_order_amount"
    label: "cumulative_order_amount"    
    description: "The cumulative value of all orders"
    type: cumulative
    input_metric: order_total
    
  - name: "cumulative_order_ammount_l1m"
    label: "cumulative_order_ammount_l1m"    
    description: "Trailing 1 month cumulative order amount"
    type: cumulative
    input_metric: order_total
    window: 1 month
  - name: "cumulative_order_amount_mtd"
    label: "cumulative_order_amount_mtd"    
    description: "The month to date value of all orders"
    type: cumulative
    input_metric: order_total
    grain_to_date: month
saved_queries:
  - name: order_metrics
    description: testing out order metrics in one table 
    query_params:
      metrics:
        - cumulative_order_amount
        - min_order_value
        - max_order_value
      group_by:
        - TimeDimension('metric_time', 'day')
    exports:
      - name: order_metrics
        config:
          export_as: table
          schema: exports
